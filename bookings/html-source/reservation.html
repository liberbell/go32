        <script>
            let attention = Prompt();

            (() => {
                'use strict';

                const forms = document.querySelectorAll('.needs-validation');
                Array.from(forms).forEach(form => {
                    form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }

                    form.classList.add('was-validated');
                    }, false);
                });
            })();

            const elem = document.getElementById('reservation-dates');
            const rangepicker = new DateRangePicker(elem, {
                format: "yyyy-mm-dd"
            });

            // let myEl = document.getElementById("myParagraph");
            // myEl.classList.add("redText");
            document.getElementById("colorButton").addEventListener("click", function() {
                // notify("This is my message", "warning")
                // notifyModal("Title", "This is text", "error", "Close")

                attention.success()
            });

            function notify(msg, msgType) {
                notie.alert({
                    type: msgType,
                    text: msg,
                });
            };

            function notifyModal(title, text, icon, confirmButtonText) {
                Swal.fire({
                    title: title,
                    text: text,
                    icon: icon,
                    confirmButtonText: confirmButtonText
                });
            };

            function Prompt() {
                let toast = function(c) {
                    const {

                    } = c;
                    
                    const Total = Swal.mixin({
                        toast: true,
                        position: "top-end",
                        showConfirmButton: false,
                        timer: 3000,
                        timerProgressBar: true,
                        didOpen: (toast) => {
                            toast.onmouseenter = Swal.stopTimer;
                            toast.onmouseleave = Swal.resumeTimer;
                        }
                    }).fire({
                        icon: "success",
                        title: "Signed in successfully"
                    });
                }

                let success = function() {
                    console.log("clicked button and got success");
                }

                return {
                    toast: toast,
                    success: success,
                }
            }

        </script>
